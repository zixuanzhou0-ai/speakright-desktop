name: Build Windows Desktop

on:
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        timeout-minutes: 5

      - name: Setup Node
        uses: actions/setup-node@v5
        timeout-minutes: 5
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        timeout-minutes: 5

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Validate desktop build
        run: npm run validate:desktop-ci
        timeout-minutes: 55

      - name: Enforce public release signing
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run desktop:release-gate
        timeout-minutes: 5

      - name: Upload controlled-test artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v5
        timeout-minutes: 10
        with:
          name: speakright-windows-controlled-test-artifacts
          path: |
            src-tauri/target/release/speakright.exe
            src-tauri/target/release/bundle/*_release-report.json
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Upload signed release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v5
        timeout-minutes: 10
        with:
          name: speakright-windows-signed-release-artifacts
          path: |
            src-tauri/target/release/speakright.exe
            src-tauri/target/release/bundle/*_release-report.json
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
