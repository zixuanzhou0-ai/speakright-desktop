name: Docs Check

on:
  pull_request:
    paths:
      - "README.md"
      - "docs/**"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        timeout-minutes: 5

      - name: Setup Node
        uses: actions/setup-node@v5
        timeout-minutes: 5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        timeout-minutes: 10

      - name: Lightweight docs validation
        run: npm run lint
        timeout-minutes: 5

      - name: Summary
        shell: pwsh
        run: |
          "Docs-only run: skipped the full Tauri desktop build." >> $env:GITHUB_STEP_SUMMARY
          "Code, public assets, scripts, src-tauri, or package changes still trigger Build Windows Desktop." >> $env:GITHUB_STEP_SUMMARY
